name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Platform-neutral checks. These validate the plugin manifests (plain JSON) and apply to
  # every platform implementation, so they live outside the per-OS lanes below.
  manifests:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate JSON + version agreement
        run: |
          python3 - <<'PY'
          import json, sys, glob

          errors = []

          # 1) Every *.json in the repo must parse.
          for path in sorted(glob.glob("**/*.json", recursive=True)):
              if "node_modules" in path:
                  continue
              try:
                  with open(path, encoding="utf-8") as f:
                      json.load(f)
              except Exception as e:  # noqa: BLE001
                  errors.append(f"{path}: invalid JSON - {e}")

          # 2) The plugin and marketplace manifests must agree on name + version.
          with open(".claude-plugin/plugin.json", encoding="utf-8") as f:
              plugin = json.load(f)
          with open(".claude-plugin/marketplace.json", encoding="utf-8") as f:
              market = json.load(f)

          entry = next((p for p in market.get("plugins", []) if p.get("name") == plugin.get("name")), None)
          if entry is None:
              errors.append(f"marketplace.json has no plugin entry named '{plugin.get('name')}'")
          elif entry.get("version") != plugin.get("version"):
              errors.append(
                  f"version mismatch: plugin.json={plugin.get('version')} "
                  f"marketplace.json={entry.get('version')}"
              )

          # 3) package.json (Node dispatcher) must agree on version too.
          with open("package.json", encoding="utf-8") as f:
              pkg = json.load(f)
          if pkg.get("version") != plugin.get("version"):
              errors.append(
                  f"version mismatch: plugin.json={plugin.get('version')} "
                  f"package.json={pkg.get('version')}"
              )

          if errors:
              print("Manifest validation FAILED:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print(f"Manifests OK (plugin '{plugin.get('name')}' v{plugin.get('version')}).")
          PY

  # The dispatcher's logic is pure, dependency-injected JavaScript, so its unit tests run
  # identically on every OS. Exercise both POSIX and Windows to catch path/separator surprises.
  node:
    name: Node dispatcher tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run tests
        run: node --test "tests/node/**/*.test.mjs"

  # Lint the PowerShell that the dispatcher delivers via -EncodedCommand (the holder and the
  # status probe). No Pester lane anymore: the logic that used to live in PowerShell now lives
  # in the Node dispatcher and is covered by the `node` job above.
  windows:
    name: Windows PowerShell lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $findings = Invoke-ScriptAnalyzer -Path scripts -Recurse `
              -Settings tests/windows/PSScriptAnalyzerSettings.psd1
          if ($findings) {
              $findings | Format-Table -AutoSize Severity, RuleName, ScriptName, Line, Message
              throw "PSScriptAnalyzer reported $($findings.Count) issue(s)."
          }
          Write-Host "PSScriptAnalyzer: clean."
